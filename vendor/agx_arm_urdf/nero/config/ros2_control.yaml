controller_manager:
  ros__parameters:
    update_rate: 100
    use_sim_time: true

    # Robot description can be set/overridden by the launch file if needed
    robot_description: ''

    # Broadcaster example
    joint_state_broadcaster:
      ros__parameters: 
        use_sim_time: true

    # Arm controller (JointTrajectoryController)
    arm_controller:
      type: position_controllers/JointTrajectoryController
      ros__parameters:
        # joints list copied from joint_names_nero_description.yaml (empty entry removed)
        joints: ['joint1', 'joint2', 'joint3', 'joint4', 'joint5', 'joint6', 'joint7']
        command_interfaces: ['position']
        state_interfaces: ['position', 'velocity', 'effort']

    # Hardware configuration example. Replace the plugin below with your actual hardware plugin
    # or remove this section if your robot uses simulation-only controllers.
    hardware:
      plugin: 'ros2_control_demo_hardware/ros2_control_demo_hardware'
      joints: ['joint1', 'joint2', 'joint3', 'joint4', 'joint5', 'joint6', 'joint7']


